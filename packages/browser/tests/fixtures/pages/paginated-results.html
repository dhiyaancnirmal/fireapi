<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pagination Fixture</title>
  </head>
  <body>
    <nav aria-label="Pagination">
      <a id="page-1" href="#page-1">1</a>
      <a id="page-2" href="#page-2">2</a>
      <button id="next-btn" type="button" aria-label="Next page">Next</button>
      <button id="load-more" type="button">Load More</button>
    </nav>
    <table id="paginated-table">
      <thead>
        <tr><th>ID</th><th>Name</th></tr>
      </thead>
      <tbody>
        <tr><td>1</td><td>Alpha</td></tr>
        <tr><td>2</td><td>Beta</td></tr>
      </tbody>
    </table>
  </body>
</html>
